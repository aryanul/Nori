# Fly.io config for the Hocuspocus sync server.
# Replace `app` with the name you choose during `fly launch`.
# `primary_region` should be the closest to your users.

app = "nori-hocuspocus"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  HOCUSPOCUS_PORT = "8080"

# Fly's http_service fronts the container with TLS, so the browser
# connects via wss://nori-hocuspocus.fly.dev — no certs to manage.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
